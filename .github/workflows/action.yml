name: CI

on:
  schedule:
    - cron: "0 18 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate cnip.rsc
        run: bash cnip.sh

      - name: Validate cnip.rsc
        run: |
          python3 - <<'PY'
          import ipaddress
          import re
          from pathlib import Path

          path = Path("cnip.rsc")
          lines = path.read_text(encoding="utf-8").splitlines()
          entries = []

          for line_number, line in enumerate(lines, 1):
              if line.startswith("add address="):
                  match = re.search(r"address=([^ ]+)", line)
                  if match is None:
                      raise SystemExit(f"missing address at line {line_number}")
                  entries.append((line_number, match.group(1)))

          if len(entries) < 8001:
              raise SystemExit(f"CN entry count too small: {len(entries)}")

          for line_number, cidr in entries:
              try:
                  ipaddress.ip_network(cidr, strict=True)
              except ValueError as exc:
                  raise SystemExit(f"invalid CIDR at line {line_number}: {exc}") from exc

          required_line = "add address=10.10.0.0/16 disabled=no list=CN"
          if required_line not in lines:
              raise SystemExit("10.10.0.0/16 entry missing")

          print(f"validated {len(entries)} entries")
          PY

      - name: Commit and push changes
        run: |
          git config user.email "tyf.liking@gmail.com"
          git config user.name "tyf1996"
          git add -- cnip.rsc
          git commit --allow-empty -m "action $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git pull --rebase
          git push
